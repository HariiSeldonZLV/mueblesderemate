<div class="modal-overlay" (click)="cerrar()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>📝 Haz tu oferta</h2>
      <button class="btn-close" (click)="cerrar()">✖</button>
    </div>

    <div class="modal-body">
      <div class="producto-info">
        <h3>{{ producto?.nombre }}</h3>
        <p class="precio-base">Precio base: <strong>${{ producto?.precio | number }}</strong></p>
        <p class="oferta-minima">Oferta mínima: <strong>${{ montoMinimo | number }}</strong></p>
      </div>

      <div *ngIf="error" class="error-message">
        ⚠️ {{ error }}
      </div>

      <div *ngIf="success" class="success-message">
        ✅ {{ success }}
      </div>

      <div class="form-group">
        <label for="monto">Tu oferta ($)</label>
        <input
          type="number"
          id="monto"
          [(ngModel)]="montoOferta"
          [min]="montoMinimo"
          class="form-control"
          placeholder="Ingresa tu oferta"
          [disabled]="loading">
      </div>

      <div class="modal-actions">
        <button class="btn-cancelar" (click)="cerrar()" [disabled]="loading">Cancelar</button>
        <button class="btn-enviar" (click)="enviarOferta()" [disabled]="loading">
          {{ loading ? 'Enviando...' : 'Enviar Oferta' }}
        </button>
      </div>

      <p class="nota">* Si tu oferta es aceptada, te contactaremos para coordinar la compra.</p>
    </div>
  </div>
</div>
